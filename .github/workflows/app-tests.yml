name: App Tests

on:
  pull_request:
    paths:
      - ".github/workflows/app-tests.yml"
      - "app/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    paths:
      - ".github/workflows/app-tests.yml"
      - "app/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: app-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22.22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage thresholds
        run: pnpm --filter ./app test:cov

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-coverage
          path: app/coverage
          retention-days: 7

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: summitdown
          POSTGRES_PASSWORD: summitdown
          POSTGRES_DB: summitdown_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U summitdown"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      BETTER_AUTH_SECRET: test-secret-test-secret-test-secret-test-secret
      BETTER_AUTH_URL: http://127.0.0.1:3000
      DATABASE_URL: postgres://summitdown:summitdown@127.0.0.1:5432/summitdown_test
      REDIS_URL: redis://127.0.0.1:6379
      EMAIL_PROVIDER: memory
      EMAIL_FROM: no-reply@test.summitdown.local
      LOG_LEVEL: error

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22.22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter ./app exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm --filter ./app test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-playwright-report
          path: |
            app/playwright-report
            app/test-results
          retention-days: 7
